spring.application.name=beggar-api
server.port=8080

# ─── DataSource (MySQL) ───────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:beggar}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=5000

# ─── JPA ─────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# ─── JWT ─────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:change-me-in-local-or-prod-properties-this-must-be-at-least-256-bits-long-aaaaaaaa}
jwt.access-token-validity-ms=3600000
jwt.refresh-token-validity-ms=1209600000

# ─── 외부 연동 ────────────────────────────────────────────────────────
kakao.rest-api-key=${KAKAO_REST_API_KEY:dummy}
ai-server.base-url=${AI_SERVER_BASE_URL:http://localhost:8000}

# ─── 로깅 ────────────────────────────────────────────────────────────
logging.level.com.beggar.api=DEBUG
logging.level.org.hibernate.SQL=DEBUG
