spring.application.name=beggar-api
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME:beggar}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

# JWT
jwt.secret=${JWT_SECRET}
jwt.access-token-validity-ms=3600000
jwt.refresh-token-validity-ms=1209600000

# External APIs
kakao.rest-api-key=${KAKAO_REST_API_KEY}
kakao.client-secret=${KAKAO_CLIENT_SECRET:}
ai-server.base-url=${AI_SERVER_BASE_URL:http://localhost:8000}
good-price.base-url=${GOOD_PRICE_BASE_URL:https://api.odcloud.kr}
good-price.path=${GOOD_PRICE_PATH:/api/3045247/v1/uddi:12a36b40-6230-4401-b647-b8456a789c7f}
good-price.api-key=${GOOD_PRICE_API_KEY}
groq.api-key=${GROQ_API_KEY}

# AWS S3
aws.access-key=${AWS_ACCESS_KEY}
aws.secret-key=${AWS_SECRET_KEY}
aws.region=${AWS_REGION:ap-northeast-2}
aws.s3.bucket=${AWS_S3_BUCKET}

# OCR
google.vision.credentials.path=classpath:google-service-account-key.json

# CORS / WebSocket
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:https://dgh1r60fiahrz.cloudfront.net,https://beggar-webfront.vercel.app}

# Logging
logging.level.com.beggar.api=${APP_LOG_LEVEL:INFO}
logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LOG_LEVEL:INFO}
